<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Connect to Blood</title>
    <link rel="icon" type="image/x-icon" href="images/logo.svg">
</head>
<body>
    <div class="background"></div>
        <form>
            <div class="img">
                <img src="images/logo.png" alt="logo" width="150px">
            </div>

            <div id="ph">
                <label for="ph.no.">Phone No.: <span style="color: red;">*</span></label><br>
                <input type="tel" id="phone" name="phone" placeholder=" +91 7854775487" required><br><br>

                <label for="password">Password: <span style="color: red;">*</span></label><br>
                <input type="password" id="pswd" placeholder="*******" required><br><br>

                <label for="bg">Blood Group: <span style="color: red;">*</span> </label>
                <select id="dropdown" required>
                    <option value=""></option>
                    <option value="B+">B+</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
            </select><br><br><br>
            </div>

            <div>
                <input type="checkbox" id="check" required>
                <label for="access">Allow access to your location</label><br><br><br>
            </div>

            <script>
                var x = document.getElementById("check");
                
                function getLocation() {
                  if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(showPosition);
                  } else { 
                    x.innerHTML = "Geolocation is not supported by this browser.";
                  }
                }
                
                function showPosition(position) {
                  x.innerHTML = "Latitude: " + position.coords.latitude + 
                  "<br>Longitude: " + position.coords.longitude;
                }
                </script>

            <div>
                <input class="btn" type="submit" value="Submit">
            </div>
        </form>
</body>
</html>
