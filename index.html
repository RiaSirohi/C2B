<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Connect to Blood</title>
    <link rel="icon" type="image/x-icon" href="images/logo.svg">
</head>
<body>
    <div class="background"></div>
        <form>
            <div class="img">
                <img src="images/logo.png" alt="logo" width="150px">
            </div>

            <div>
                <label for="ph.no.">Phone No.: <span style="color: red;">*</span></label><br>
                <input type="number" required><br><br>

                <label for="password">Password: <span style="color: red;">*</span></label><br>
                <input type="password" required><br><br><br>
            </div>

            <div>
                <input type="checkbox" required>
                <label for="access">Allow access to your location</label><br><br><br>
            </div>

            <div>
                <input class="btn" type="submit" value="Submit">
            </div>
        </form>
</body>
</html>
